name: Build Windows EXE
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: pip install pyinstaller PyQt5
    - name: Build EXE
      run: pyinstaller --onefile --noconsole --name "kr28vSolovyev" kr28vSolovyev.py
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: dist/Variant_28.exe
